<div class="page-container">
  <div class="card">
    <h2>🔗 Allocate Resources to Event</h2>
    <div class="success-msg" *ngIf="showMessage">{{ responseMessage }}</div>
    <div class="error-msg" *ngIf="showError">{{ errorMessage }}</div>
    <form [formGroup]="itemForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Select Event *</label>
        <select formControlName="eventId">
          <option value="">-- Select Event --</option>
          <option *ngFor="let event of eventList" [value]="event.eventID">{{ event.title }}</option>
        </select>
        <div class="error-text" *ngIf="itemForm.get('eventId')?.invalid && itemForm.get('eventId')?.touched">Event is required.</div>
      </div>
      <div class="form-group">
        <label>Select Resource *</label>
        <select formControlName="resourceId">
          <option value="">-- Select Resource --</option>
          <option *ngFor="let res of resourceList" [value]="res.resourceID">{{ res.name }} ({{ res.type }})</option>
        </select>
        <div class="error-text" *ngIf="itemForm.get('resourceId')?.invalid && itemForm.get('resourceId')?.touched">Resource is required.</div>
      </div>
      <div class="form-group">
        <label>Quantity *</label>
        <input type="number" formControlName="quantity" placeholder="Enter quantity" min="1" />
        <div class="error-text" *ngIf="itemForm.get('quantity')?.invalid && itemForm.get('quantity')?.touched">Quantity is required.</div>
      </div>
      <button type="submit" class="btn-primary" [disabled]="itemForm.invalid">Allocate Resource</button>
    </form>
  </div>
</div>
<style>
  .page-container { padding:24px; max-width:600px; margin:0 auto; }
  .card { background:#fff; border-radius:12px; padding:28px; box-shadow:0 4px 20px rgba(0,0,0,0.08); }
  h2 { color:#333; margin-bottom:20px; }
  .form-group { margin-bottom:16px; }
  .form-group label { display:block; color:#555; font-weight:600; margin-bottom:6px; }
  .form-group input, .form-group select { width:100%; padding:10px 12px; border:1px solid #ddd; border-radius:8px; font-size:14px; box-sizing:border-box; }
  .error-text { color:#e74c3c; font-size:12px; margin-top:4px; }
  .success-msg { background:#eaffea; color:#27ae60; padding:10px; border-radius:8px; margin-bottom:16px; }
  .error-msg { background:#ffeaea; color:#c0392b; padding:10px; border-radius:8px; margin-bottom:16px; }
  .btn-primary { padding:12px 28px; background:#6c63ff; color:#fff; border:none; border-radius:8px; font-size:15px; cursor:pointer; }
</style>
