<!-- Bootstrap Icons CDN -->
<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
/>

<div class="register-container">
  <div class="register-card">

    <div class="register-header">
      <h2>📋 Create Account</h2>
      <p>Register to access the platform</p>
    </div>

    <div class="success-msg" *ngIf="showMessage">
      {{ responseMessage }}
    </div>

    <form [formGroup]="itemForm" (ngSubmit)="onRegister()">

      <!-- Username Field -->
      <div class="form-group">
        <label>Username</label>
        <input
          type="text"
          formControlName="username"
          placeholder="Enter username"
        />

        <div *ngIf="itemForm.controls['username'].touched && itemForm.controls['username'].errors">
          <small class="text-danger" *ngIf="itemForm.controls['username'].errors?.['required']">
            Username is required
          </small>
          <small class="text-danger" *ngIf="itemForm.controls['username'].errors?.['minlength']">
            Minimum 3 characters required
          </small>
        </div>
      </div>

      <!-- Email Field -->
      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          formControlName="email"
          placeholder="Enter email"
        />
        <div class="error-text" *ngIf="itemForm.get('email')?.invalid && itemForm.get('email')?.touched">
          Valid email is required.
        </div>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label>Password</label>

        <div class="password-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="Enter password"
          />

          <button
            type="button"
            class="show-btn"
            (click)="togglePassword()"
            aria-label="Toggle password visibility"
          >
            <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash-fill' : 'bi-eye-fill'"></i>
          </button>
        </div>

        <div *ngIf="itemForm.controls['password'].touched && itemForm.controls['password'].errors">
          <small class="text-danger" *ngIf="itemForm.controls['password'].errors?.['required']">
            Password is required
          </small>
          <small class="text-danger" *ngIf="itemForm.controls['password'].errors?.['passwordStrength']">
            At least 1 capital character, 1 special symbol and 1 number required
          </small>
        </div>
      </div>

      <!-- Role Field -->
      <div class="form-group">
        <label>Role</label>
        <select formControlName="role">
          <option value="">-- Select Role --</option>
          <option value="PLANNER">Planner</option>
          <option value="STAFF">Staff</option>
          <option value="CLIENT">Client</option>
        </select>

        <div class="error-text" *ngIf="itemForm.get('role')?.invalid && itemForm.get('role')?.touched">
          Role is required.
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn-primary">
        Register
      </button>

      <p class="login-link">
        Already have an account?
        <a routerLink="/login" style="color:#6c63ff;">Login here</a>
      </p>

    </form>

  </div>
</div>

<!-- Inline styling for password eye button -->
<style>
  .password-wrapper {
    position: relative;
  }

  .password-wrapper input {
    width: 100%;
    padding-right: 40px;
  }

  .show-btn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    cursor: pointer;
    color: #666;
    padding: 0;
  }

  .show-btn i {
    font-size: 1.2rem;
  }

  .show-btn:hover i {
    color: #6c63ff;
  }
</style>
