<div class="register-container">
  <div class="register-card">

    <div class="register-header">
      <h2>📋 Create Account</h2>
      <p>Register to access the platform</p>
    </div>

    <div class="success-msg" *ngIf="showMessage">
      {{ responseMessage }}
    </div>

    <form [formGroup]="itemForm" (ngSubmit)="onRegister()">

      <div class="form-group">
        <label>Username</label>
        <input
          type="text"
          formControlName="username"
          placeholder="Enter username"
        />
        <div
          class="error-text"
          *ngIf="itemForm.get('username')?.invalid && itemForm.get('username')?.touched">
          Username is required.
        </div>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          formControlName="email"
          placeholder="Enter email"
        />
        <div
          class="error-text"
          *ngIf="itemForm.get('email')?.invalid && itemForm.get('email')?.touched">
          Valid email is required.
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          formControlName="password"
          placeholder="Enter password"
        />
        <div
          class="error-text"
          *ngIf="itemForm.get('password')?.invalid && itemForm.get('password')?.touched">
          Password is required.
        </div>
      </div>

      <div class="form-group">
        <label>Role</label>
        <select formControlName="role">
          <option value="">-- Select Role --</option>
          <option value="PLANNER">Planner</option>
          <option value="STAFF">Staff</option>
          <option value="CLIENT">Client</option>
        </select>
        <div
          class="error-text"
          *ngIf="itemForm.get('role')?.invalid && itemForm.get('role')?.touched">
          Role is required.
        </div>
      </div>

      <button type="submit" class="btn-primary">
        Register
      </button>

      <p class="login-link">
        Already have an account?
        <a routerLink="/login" style="color:#6c63ff;">Login here</a>
      </p>

    </form>
  </div>
</div>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  .register-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    font-family: 'Segoe UI', sans-serif;
  }

  .register-card {
    background: #ffffff;
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
  }

  .register-header {
    text-align: center;
    margin-bottom: 24px;
  }

  .register-header h2 {
    color: #333;
    font-size: 22px;
    margin-bottom: 6px;
  }

  .register-header p {
    color: #888;
    font-size: 14px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    color: #555;
    font-weight: 600;
    margin-bottom: 6px;
    font-size: 14px;
  }

  .form-group input,
  .form-group select {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border 0.2s;
  }

  .form-group input:focus,
  .form-group select:focus {
    border-color: #6c63ff;
  }

  .error-text {
    color: #e74c3c;
    font-size: 12px;
    margin-top: 4px;
  }

  .success-msg {
    background: #eaffea;
    border: 1px solid #27ae60;
    color: #27ae60;
    padding: 10px 14px;
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 14px;
    text-align: center;
  }

  .btn-primary {
    width: 100%;
    padding: 12px;
    background: #6c63ff;
    color: #ffffff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-primary:hover {
    background: #574fd6;
  }

  .login-link {
    text-align: center;
    margin-top: 14px;
    color: #888;
    font-size: 14px;
  }
</style>
