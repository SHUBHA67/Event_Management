<div class="page-container">
  <div class="card">
    <h2>🔍 Search Event Details</h2>

    <div class="search-row">
      <input type="number" [(ngModel)]="formModel.eventID" placeholder="Enter Event ID" />
      <button class="btn-search" (click)="searchEvent()">Search</button>
    </div>

    <div class="error-msg" *ngIf="showError">{{ errorMessage }}</div>
    <div class="success-msg" *ngIf="showMessage">{{ responseMessage }}</div>

    <div *ngFor="let event of eventObj" class="event-detail-card">
      <div class="event-detail-header">
        <h3>{{ event.title }}</h3>
        <span class="badge">{{ event.status }}</span>
      </div>

      <p>{{ event.description }}</p>

      <div class="event-meta">
        <span>📍 {{ event.location }}</span>
        <span>📅 {{ event.dateTime | date:'medium' }}</span>
      </div>

      <button class="btn-edit" (click)="edit(event)">✏️ Edit Event</button>
    </div>
  </div>

  <div class="card" *ngIf="isUpdate">
    <h3>✏️ Update Event</h3>

    <form [formGroup]="itemForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label>Title *</label>
        <input type="text" formControlName="title" />
        <div class="error-text"
             *ngIf="itemForm.get('title')?.invalid && itemForm.get('title')?.touched">
          Title is required.
        </div>
      </div>

      <div class="form-group">
        <label>Description *</label>
        <textarea formControlName="description" rows="3"></textarea>
        <div class="error-text"
             *ngIf="itemForm.get('description')?.invalid && itemForm.get('description')?.touched">
          Description is required.
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Date & Time *</label>
          <input type="datetime-local" formControlName="dateTime" />
        </div>

        <div class="form-group">
          <label>Location *</label>
          <input type="text" formControlName="location" />
        </div>
      </div>

      <div class="form-group">
        <label>Status *</label>
        <select formControlName="status">
          <option value="">-- Select Status --</option>
          <option value="PLANNED">Planned</option>
          <option value="ONGOING">Ongoing</option>
          <option value="COMPLETED">Completed</option>
          <option value="CANCELLED">Cancelled</option>
        </select>
      </div>

      <button type="submit" class="btn-primary" [disabled]="itemForm.invalid">
        Update Event
      </button>

    </form>
  </div>
</div>
