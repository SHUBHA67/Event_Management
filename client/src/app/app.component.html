<div *ngIf="IsLoggin" class="navbar">
  <div class="nav-brand">🎯 Event Manager</div>
  <div class="nav-links">
    <ng-container *ngIf="roleName === 'PLANNER'">
      <a routerLink="/create-event" routerLinkActive="active">Create Event</a>
      <a routerLink="/add-resource" routerLinkActive="active">Add Resource</a>
      <a routerLink="/resource-allocate" routerLinkActive="active">Allocate Resource</a>
    </ng-container>
    <ng-container *ngIf="roleName === 'STAFF'">
      <a routerLink="/view-events" routerLinkActive="active">View Events</a>
    </ng-container>
    <ng-container *ngIf="roleName === 'CLIENT'">
      <a routerLink="/booking-details" routerLinkActive="active">Booking Details</a>
    </ng-container>
    <button class="btn-logout" (click)="logout()">Logout</button>
  </div>
</div>
<router-outlet></router-outlet>
<style>
  .navbar { display:flex; justify-content:space-between; align-items:center; padding:14px 28px; background:#2c3e50; color:#fff; }
  .nav-brand { font-size:18px; font-weight:700; }
  .nav-links { display:flex; gap:16px; align-items:center; }
  .nav-links a { color:#bdc3c7; text-decoration:none; font-size:14px; padding:6px 12px; border-radius:6px; }
  .nav-links a:hover, .nav-links a.active { background:#3d5166; color:#fff; }
  .btn-logout { padding:7px 16px; background:#e74c3c; color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:13px; }
</style>
