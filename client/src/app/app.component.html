<div *ngIf="IsLoggin" class="navbar">
  <div class="nav-brand" (click)="goToDashboard()" style="cursor: pointer;">🎯 Event Manager</div>

  <!-- Hamburger -->
  <div class="hamburger" [class.open]="menuOpen" (click)="toggleMenu()">
    <span></span><span></span><span></span>
  </div>

  <div class="nav-links" [class.open]="menuOpen">

    <a routerLink="/dashboard" routerLinkActive="active" (click)="closeMenu()">Dashboard</a>

    <!-- PLANNER -->
    <ng-container *ngIf="roleName === 'PLANNER'">
      <a routerLink="/create-event"    routerLinkActive="active" (click)="closeMenu()">Create Event</a>
      <a routerLink="/add-resource"    routerLinkActive="active" (click)="closeMenu()">Add Resource</a>
      <a routerLink="/resource-allocate" routerLinkActive="active" (click)="closeMenu()">Allocate Resource</a>
      <!-- NEW -->
      <a routerLink="/manage-requests" routerLinkActive="active" (click)="closeMenu()">
        Client Requests
      </a>
    </ng-container>

    <!-- STAFF -->
    <ng-container *ngIf="roleName === 'STAFF'">
      <a routerLink="/view-events" routerLinkActive="active" (click)="closeMenu()">View Events</a>
    </ng-container>

    <!-- CLIENT -->
    <ng-container *ngIf="roleName === 'CLIENT'">
      <a routerLink="/browse-events"  routerLinkActive="active" (click)="closeMenu()">Browse Events</a>
      <!-- NEW -->
      <a routerLink="/submit-request" routerLinkActive="active" (click)="closeMenu()">Submit Request</a>
      <a routerLink="/booking-details" routerLinkActive="active" (click)="closeMenu()">Booking Details</a>
    </ng-container>

    <button class="btn-logout" (click)="logout()">Logout</button>
  </div>
</div>

<router-outlet></router-outlet>
