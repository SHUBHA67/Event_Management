<div class="page-container">
  <div class="card">
    <h2>🔧 Add New Resource</h2>

    <div class="success-msg" *ngIf="showMessage">{{ responseMessage }}</div>
    <div class="error-msg" *ngIf="showError">{{ errorMessage }}</div>

    <form [formGroup]="itemForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label>Resource Name *</label>
        <input type="text" formControlName="name" placeholder="Enter resource name" />
        <div class="error-text"
          *ngIf="itemForm.get('name')?.invalid && itemForm.get('name')?.touched">
          Name is required.
        </div>
      </div>

      <div class="form-group">
        <label>Resource Type *</label>
        <input type="text" formControlName="type" placeholder="Enter resource type" />
        <div class="error-text"
          *ngIf="itemForm.get('type')?.invalid && itemForm.get('type')?.touched">
          Type is required.
        </div>
      </div>

      <div class="form-group">
        <label>Availability *</label>
        <select formControlName="availability">
          <option value="">-- Select --</option>
          <option value="true">Available</option>
          <option value="false">Not Available</option>
        </select>
        <div class="error-text"
          *ngIf="itemForm.get('availability')?.invalid && itemForm.get('availability')?.touched">
          Availability is required.
        </div>
      </div>

      <button type="submit" class="btn-primary" [disabled]="itemForm.invalid">
        Add Resource
      </button>

    </form>
  </div>

  <!-- Resources Table -->
  <div class="card" *ngIf="resourceList.length > 0">
    <h3>📦 All Resources</h3>

    <!-- ⭐ TABLE RESPONSIVE WRAPPER ADDED -->
    <div class="table-responsive">
      <table class="data-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Type</th>
            <th>Availability</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let res of resourceList">
            <td>{{ res.resourceID }}</td>
            <td>{{ res.name }}</td>
            <td>{{ res.type }}</td>
            <td>
              <span [ngClass]="res.availability ? 'badge-green' : 'badge-red'">
                {{ res.availability ? 'Available' : 'Unavailable' }}
              </span>
            </td>
          </tr>
        </tbody>

      </table>
    </div>
  </div>
</div>
