<!-- Animated background -->
<div class="animated-bg"></div>

<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h2>🎯 Event Management</h2>
      <p>Sign in to your account</p>
    </div>

    <form [formGroup]="itemForm" (ngSubmit)="onLogin()">

      <!-- Username -->
      <div class="form-group">
        <label>Username</label>
        <div class="input-wrapper">
          <i class="bi bi-person"></i>
          <input
            type="text"
            formControlName="username"
            placeholder="Enter username"
            autocomplete="username"
          />
        </div>
        <div
          class="error-text"
          *ngIf="itemForm.get('username')?.invalid && itemForm.get('username')?.touched"
        >
          Username is required.
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <i class="bi bi-lock"></i>
          <input
            type="password"
            formControlName="password"
            placeholder="Enter password"
            autocomplete="current-password"
          />
        </div>
        <div
          class="error-text"
          *ngIf="itemForm.get('password')?.invalid && itemForm.get('password')?.touched"
        >
          Password is required.
        </div>
      </div>

      <!-- Error Message -->
      <div class="alert-error" *ngIf="showError">
        {{ errorMessage }}
      </div>

      <!-- Login Button -->
      <button
        type="submit"
        class="btn-primary"
        [disabled]="itemForm.invalid || isLoading"
      >
        <span *ngIf="!isLoading">
          <i class="bi bi-box-arrow-in-right"></i> Sign In
        </span>

        <span *ngIf="isLoading" class="loading">
          <span class="spinner"></span> Signing in...
        </span>
      </button>

      <!-- Register -->
      <p class="register-link">
        Dont have an account?
        <a
          (click)="registration()"
          style="cursor:pointer;color:#6c63ff;"
        >
          Register here
        </a>
      </p>
    </form>
  </div>
</div>

<!-- Inline CSS (UI Enhancements Only) -->
<style>
/* Animated background */
.animated-bg {
  position: fixed;
  inset: 0;
  z-index: -1;
  background: linear-gradient(120deg, #6c63ff, #4facfe);
  background-size: 300% 300%;
  animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Input with icon */
.input-wrapper {
  position: relative;
}

.input-wrapper i {
  position: absolute;
  top: 50%;
  left: 12px;
  transform: translateY(-50%);
  color: #888;
}

.input-wrapper input {
  padding-left: 38px;
}

/* Spinner */
.spinner {
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255,255,255,0.4);
  border-top: 2px solid #fff;
  border-radius: 50%;
  display: inline-block;
  margin-right: 8px;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Button loading state */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
}
</style>
