<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h2>🎯 Event Management</h2>
      <p>Sign in to your account</p>
    </div>
    <form [formGroup]="itemForm" (ngSubmit)="onLogin()">
      <div class="form-group">
        <label>Username</label>
        <input type="text" formControlName="username" placeholder="Enter username" />
        <div class="error-text" *ngIf="itemForm.get('username')?.invalid && itemForm.get('username')?.touched">Username is required.</div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="Enter password" />
        <div class="error-text" *ngIf="itemForm.get('password')?.invalid && itemForm.get('password')?.touched">Password is required.</div>
      </div>
      <div class="alert-error" *ngIf="showError">{{ errorMessage }}</div>
      <button type="submit" class="btn-primary" [disabled]="itemForm.invalid">Login</button>
      <p class="register-link">Don't have an account? <a (click)="registration()" style="cursor:pointer;color:#6c63ff;">Register here</a></p>
    </form>
  </div>
</div>
<style>
  .login-container { display:flex; justify-content:center; align-items:center; min-height:100vh; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); }
  .login-card { background:#fff; border-radius:16px; padding:40px; width:100%; max-width:400px; box-shadow:0 20px 60px rgba(0,0,0,0.15); }
  .login-header { text-align:center; margin-bottom:30px; }
  .login-header h2 { color:#333; font-size:24px; margin-bottom:6px; }
  .login-header p { color:#888; }
  .form-group { margin-bottom:18px; }
  .form-group label { display:block; color:#555; font-weight:600; margin-bottom:6px; }
  .form-group input { width:100%; padding:12px 14px; border:1px solid #ddd; border-radius:8px; font-size:14px; box-sizing:border-box; }
  .form-group input:focus { border-color:#6c63ff; outline:none; }
  .error-text { color:#e74c3c; font-size:12px; margin-top:4px; }
  .alert-error { background:#ffeaea; border:1px solid #e74c3c; color:#c0392b; padding:10px; border-radius:8px; margin-bottom:16px; font-size:14px; }
  .btn-primary { width:100%; padding:12px; background:#6c63ff; color:#fff; border:none; border-radius:8px; font-size:16px; font-weight:600; cursor:pointer; }
  .btn-primary:hover { background:#574fd6; }
  .btn-primary:disabled { background:#bbb; cursor:not-allowed; }
  .register-link { text-align:center; margin-top:16px; color:#888; font-size:14px; }
</style>
