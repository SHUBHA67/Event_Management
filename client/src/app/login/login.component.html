<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h2>🎯 Event Management</h2>
      <p>Sign in to your account</p>
    </div>

    <form [formGroup]="itemForm" (ngSubmit)="onLogin()">
      <div class="form-group">
        <label>Username</label>
        <input type="text" formControlName="username" placeholder="Enter username" />
        <div class="error-text" *ngIf="itemForm.get('username')?.invalid && itemForm.get('username')?.touched">
          Username is required.
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="Enter password" />
        <div class="error-text" *ngIf="itemForm.get('password')?.invalid && itemForm.get('password')?.touched">
          Password is required.
        </div>
      </div>

      <div class="alert-error" *ngIf="showError">{{ errorMessage }}</div>

      <button type="submit" class="btn-primary" [disabled]="itemForm.invalid">Login</button>

      <p class="register-link">
        Don't have an account?
        <a (click)="registration()" style="cursor:pointer;color:#6c63ff;">Register here</a>
      </p>
    </form>
  </div>
</div>
