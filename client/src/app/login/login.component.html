<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<div class="auth-page">

  <!-- SIDEBAR -->
  <div class="auth-sidebar">
    <img src="assets/images/logo.png" alt="Eventia Logo"
      style="width: 240px; height: 240px; object-fit: contain; margin-right: 8px; vertical-align: middle;" />
    <!-- <div class="sidebar-brand">Eventia</div> -->
    <div class="sidebar-content">
      <h2>Welcome Back</h2>
      <p>Sign in to continue managing your events, resources and team.</p>
    </div>
    <div class="sidebar-decoration">
      <div class="deco-circle dc1"></div>
      <div class="deco-circle dc2"></div>
    </div>
  </div>


  <!-- FORM AREA -->
  <div class="auth-form-area">
    <button class="back-btn" (click)="goToLanding()">
      <span class="back-arrow">&#8592;</span> Back to Home
    </button>

    <div class="auth-card">
      <h2>Sign In</h2>
      <p class="auth-subtitle">Enter your credentials to access your account</p>

      <form [formGroup]="itemForm" (ngSubmit)="onLogin()">

        <div class="form-group">
          <label>Username</label>
          <input type="text" formControlName="username" placeholder="Enter your username" />
          <div class="error-text" *ngIf="itemForm.get('username')?.invalid && itemForm.get('username')?.touched">
            Username is required.
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="password-wrap">
            <input [type]="showPassword ? 'text' : 'password'" formControlName="password"
              placeholder="Enter your password" />
            <button type="button" class="pw-toggle" (click)="togglePassword()">
              {{ showPassword ? 'Hide' : 'Show' }}
            </button>
          </div>
          <div class="error-text" *ngIf="itemForm.get('password')?.invalid && itemForm.get('password')?.touched">
            Password is required.
          </div>
        </div>

        <div class="alert-error" *ngIf="showError">{{ errorMessage }}</div>

        <button type="submit" class="btn-primary" [disabled]="itemForm.invalid">Sign In</button>

        <p class="auth-link">
          Don't have an account?
          <a (click)="registration()">Register here</a>
        </p>
      </form>
    </div>
  </div>


</div>
